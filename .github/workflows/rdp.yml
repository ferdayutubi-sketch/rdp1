name: RDP Gratis Instan

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Install Cloudflare via Choco
      run: |
        choco install cloudflared -y
    - name: Configure RDP User
      run: |
        net user youtubeuser YoutubeRDP123! /add
        net localgroup administrators youtubeuser /add
    - name: Jalankan Tunnel & Dapatkan Link RDP
      run: |
        cloudflared tunnel --url rdp://localhost:3389
