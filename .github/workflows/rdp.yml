name: RDP Ngrok Super Instan

on:  
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 3G3zbrcEJivGX7124xlFdBRf1Vz_5w5WaAR7NZeV6bDkk8te2
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Mengaktifkan RDP Windows
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Pasang Ngrok Resmi
      run: |
        choco install ngrok -y
    - name: Jalankan Koneksi RDP
      run: |
        net user youtubeuser YoutubeRDP123! /add
        net localgroup administrators youtubeuser /add
        ngrok tcp --authtoken ${{ github.event.inputs.ngrok_token }} 3389
