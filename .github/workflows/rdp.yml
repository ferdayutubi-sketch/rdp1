name: RDP Gratis Instan

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Download Cloudflare Standalone Executable
      run: |
        Invoke-WebRequest -Uri "https://github.com" -OutFile "cloudflared.exe"
    - name: Configure RDP User
      run: |
        net user youtubeuser YoutubeRDP123! /add
        net localgroup administrators youtubeuser /add
    - name: Jalankan Tunnel & Dapatkan Link RDP
      run: |
        ./cloudflared.exe tunnel --url rdp://localhost:3389
